<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudyHub — MKG101 · ACC101 · ECO111 · SSA101</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='bg' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%236366f1'/%3E%3Cstop offset='50%25' stop-color='%230ea5e9'/%3E%3Cstop offset='100%25' stop-color='%2310b981'/%3E%3C/linearGradient%3E%3ClinearGradient id='shine' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%23ffffff' stop-opacity='0.25'/%3E%3Cstop offset='100%25' stop-color='%23ffffff' stop-opacity='0'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='64' height='64' rx='14' fill='url(%23bg)'/%3E%3Crect width='64' height='64' rx='14' fill='url(%23shine)'/%3E%3Cg transform='translate(10,11)'%3E%3Crect x='2' y='2' width='28' height='36' rx='4' fill='%23ffffff' opacity='0.18'/%3E%3Crect x='0' y='0' width='28' height='36' rx='4' fill='none' stroke='%23ffffff' stroke-width='2.2' opacity='0.9'/%3E%3Cline x1='6' y1='10' x2='22' y2='10' stroke='%23ffffff' stroke-width='2' stroke-linecap='round' opacity='0.9'/%3E%3Cline x1='6' y1='16' x2='22' y2='16' stroke='%23ffffff' stroke-width='2' stroke-linecap='round' opacity='0.9'/%3E%3Cline x1='6' y1='22' x2='16' y2='22' stroke='%23ffffff' stroke-width='2' stroke-linecap='round' opacity='0.9'/%3E%3Ccircle cx='33' cy='30' r='9' fill='%23f59e0b' opacity='0.95'/%3E%3Ccircle cx='33' cy='30' r='3.5' fill='%23ffffff' opacity='0.95'/%3E%3Cline x1='38.5' y1='24.5' x2='40.5' y2='22.5' stroke='%23f59e0b' stroke-width='2' stroke-linecap='round' opacity='0.85'/%3E%3Cline x1='39.5' y1='30' x2='42' y2='30' stroke='%23f59e0b' stroke-width='2' stroke-linecap='round' opacity='0.85'/%3E%3Cline x1='38.5' y1='35.5' x2='40.5' y2='37.5' stroke='%23f59e0b' stroke-width='2' stroke-linecap='round' opacity='0.85'/%3E%3C/g%3E%3C/svg%3E">
<meta name="theme-color" content="#6366f1">
<meta name="apple-mobile-web-app-title" content="StudyHub">
<meta name="apple-mobile-web-app-capable" content="yes">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#08090e;
  --surface:#0f1117;
  --card:#161820;
  --card2:#1c1e2a;
  --border:#252736;
  --border2:#2e3147;
  --text:#eeeef4;
  --muted:#676884;
  --muted2:#4a4c64;
  --acc1:#6366f1; /* indigo - MKG */
  --acc2:#0ea5e9; /* sky - ACC */
  --acc3:#10b981; /* emerald - ECO */
  --gold:#f59e0b;
  --red:#ef4444;
  --green:#22c55e;
  --acc4:#f97316; /* orange - SSA */
  --acc5:#a855f7; /* purple - ENG */
  --radius:16px;
}
body{background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;min-height:100vh;overflow-x:hidden}

/* ─── NOISE TEXTURE ─── */
body::after{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:9999;opacity:.4}

/* ─── LOGIN ─── */
.login-page{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;background:var(--bg)}
.login-page.hidden{display:none}
.login-card{background:var(--card);border:1px solid var(--border);border-radius:24px;padding:48px 44px;width:100%;max-width:440px;position:relative;overflow:hidden;animation:fadeUp .5s ease}
.login-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--acc1),var(--acc2),var(--acc3))}
.login-logo{text-align:center;margin-bottom:36px}
.login-logo .dot-row{display:flex;justify-content:center;gap:8px;margin-bottom:16px}
.login-logo .dot{width:10px;height:10px;border-radius:50%}
.login-logo h1{font-size:28px;font-weight:800;color:var(--text);margin-bottom:6px;letter-spacing:-.5px}
.login-logo p{color:var(--muted);font-size:13px}
.field{margin-bottom:18px}
.field label{display:block;font-size:11px;font-weight:700;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px}
.field input{width:100%;background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:13px 16px;color:var(--text);font-family:inherit;font-size:14px;outline:none;transition:border-color .2s}
.field input:focus{border-color:var(--acc1)}
.field input::placeholder{color:var(--muted2)}
.pw-wrap{position:relative}
.pw-wrap input{padding-right:46px}
.pw-eye{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--muted);font-size:16px;padding:0;transition:color .2s}
.pw-eye:hover{color:var(--acc1)}
.login-err{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);border-radius:10px;padding:11px 14px;font-size:13px;color:var(--red);margin-bottom:18px;display:none;animation:fadeUp .3s ease}
.login-err.show{display:block}
.login-btn{width:100%;padding:15px;background:linear-gradient(135deg,var(--acc1),var(--acc2));border:none;border-radius:12px;color:#fff;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;letter-spacing:.3px}
.login-btn:hover{opacity:.88;transform:translateY(-2px)}
.login-hint{text-align:center;margin-top:16px;font-size:12px;color:var(--muted)}

/* ─── APP SHELL ─── */
.app{display:none}
.app.show{display:flex;flex-direction:column;min-height:100vh}

/* ─── TOP NAV ─── */
.topnav{position:sticky;top:0;z-index:50;background:rgba(8,9,14,.85);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;gap:0;height:60px}
.brand{font-size:17px;font-weight:800;background:linear-gradient(90deg,var(--acc1),var(--acc2),var(--acc3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-right:32px;white-space:nowrap}
.nav-courses{display:flex;gap:4px;flex:1}
.nav-btn{background:none;border:none;padding:8px 16px;border-radius:10px;cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;color:var(--muted);transition:all .2s;white-space:nowrap}
.nav-btn:hover{color:var(--text);background:var(--card)}
.nav-btn.active{color:var(--text)}
.nav-btn.active[data-course="0"]{background:rgba(99,102,241,.18);color:#818cf8}
.nav-btn.active[data-course="1"]{background:rgba(14,165,233,.18);color:#38bdf8}
.nav-btn.active[data-course="2"]{background:rgba(16,185,129,.18);color:#34d399}
.nav-btn.active[data-course="3"]{background:rgba(251,146,60,.18);color:#fb923c}
.nav-btn.active[data-course="4"]{background:rgba(168,85,247,.18);color:#c084fc}
.nav-right{display:flex;align-items:center;gap:12px;margin-left:auto}
.user-chip{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--border);border-radius:20px;padding:6px 14px 6px 10px;font-size:12px;font-weight:600;color:var(--muted)}
.user-chip .dot{width:7px;height:7px;background:var(--green);border-radius:50%;box-shadow:0 0 6px var(--green)}
.logout-btn{background:none;border:1px solid var(--border);border-radius:8px;padding:6px 12px;color:var(--muted);font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s}
.logout-btn:hover{border-color:var(--red);color:var(--red)}

/* ─── MAIN CONTENT ─── */
.main{flex:1;padding:32px 24px;max-width:960px;margin:0 auto;width:100%}

/* ─── COURSE HOME ─── */
.course-home{animation:fadeUp .35s ease}
.course-header{margin-bottom:32px}
.course-badge{display:inline-flex;align-items:center;gap:8px;padding:6px 16px;border-radius:20px;font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:14px}
.course-header h2{font-size:32px;font-weight:800;letter-spacing:-.5px;margin-bottom:8px}
.course-header p{color:var(--muted);font-size:15px}
.stats-row{display:flex;gap:14px;margin-bottom:36px;flex-wrap:wrap}
.stat-chip{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 20px;flex:1;min-width:110px}
.stat-chip .num{font-family:'JetBrains Mono',monospace;font-size:24px;font-weight:600;margin-bottom:4px}
.stat-chip .lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px}

/* Mode cards */
.mode-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.mode-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:28px 24px;cursor:pointer;transition:all .25s;position:relative;overflow:hidden}
.mode-card:hover{transform:translateY(-4px);border-color:var(--border2)}
.mode-card::after{content:'';position:absolute;inset:0;opacity:0;transition:opacity .25s;border-radius:20px}
.mode-card:hover::after{opacity:1}
.mode-icon{font-size:36px;margin-bottom:16px;display:block}
.mode-card h3{font-size:17px;font-weight:700;margin-bottom:6px}
.mode-card p{font-size:13px;color:var(--muted);line-height:1.5}
.mode-arrow{position:absolute;top:20px;right:20px;font-size:18px;color:var(--muted2);transition:transform .2s}
.mode-card:hover .mode-arrow{transform:translate(4px,-4px)}

/* ─── FLASHCARD MODE ─── */
.flashcard-view{animation:fadeUp .3s ease}
.fc-header{display:flex;align-items:center;gap:16px;margin-bottom:28px;flex-wrap:wrap}
.fc-header h3{font-size:20px;font-weight:700;flex:1}
.fc-progress-text{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--muted)}
.fc-progress-bar{background:var(--border);border-radius:6px;height:5px;margin-bottom:28px;overflow:hidden}
.fc-progress-fill{height:100%;border-radius:6px;transition:width .4s ease}

.card-stage{perspective:1200px;margin-bottom:24px}
.card-inner{position:relative;width:100%;min-height:280px;transform-style:preserve-3d;transition:transform .55s cubic-bezier(.4,0,.2,1);cursor:pointer}
.card-inner.flipped{transform:rotateY(180deg)}
.card-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:20px;display:flex;align-items:center;justify-content:center;padding:36px 40px;border:1.5px solid var(--border);min-height:280px}
.card-front{background:var(--card)}
.card-back{background:var(--card2);transform:rotateY(180deg);flex-direction:column;gap:12px}
.card-label{position:absolute;top:18px;left:22px;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted2)}
.card-q{font-size:18px;font-weight:600;line-height:1.6;text-align:center;color:var(--text)}
.card-a{font-size:16px;font-weight:600;line-height:1.6;text-align:center;color:var(--green)}
.card-hint{font-size:12px;color:var(--muted);text-align:center}
.card-flip-hint{text-align:center;font-size:13px;color:var(--muted);margin-bottom:20px}

.fc-controls{display:flex;align-items:center;justify-content:center;gap:12px}
.fc-btn{background:var(--card);border:1.5px solid var(--border);border-radius:12px;padding:12px 20px;color:var(--text);font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:8px}
.fc-btn:hover:not(:disabled){background:var(--card2);border-color:var(--border2);transform:translateY(-1px)}
.fc-btn:disabled{opacity:.35;cursor:default}
.fc-btn.primary{background:var(--acc1);border-color:var(--acc1);color:#fff}
.fc-btn.primary:hover:not(:disabled){opacity:.85}
.fc-shuffle-row{display:flex;justify-content:center;gap:10px;margin-top:14px}

/* ─── LEARN MODE ─── */
.learn-view{animation:fadeUp .3s ease}
.lrn-header{display:flex;align-items:center;gap:16px;margin-bottom:20px;flex-wrap:wrap}
.lrn-header h3{font-size:20px;font-weight:700;flex:1}
.lrn-progress-bar{background:var(--border);border-radius:6px;height:5px;margin-bottom:28px;overflow:hidden}
.lrn-progress-fill{height:100%;border-radius:6px;transition:width .4s ease}

.q-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:32px;margin-bottom:16px;position:relative;overflow:hidden}
.q-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.q-num{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:14px}
.q-text{font-size:16px;font-weight:600;line-height:1.65;color:var(--text);margin-bottom:26px}
.opts{display:flex;flex-direction:column;gap:10px}
.opt-btn{background:var(--surface);border:1.5px solid var(--border);border-radius:14px;padding:14px 18px;color:var(--text);font-family:inherit;font-size:14px;cursor:pointer;display:flex;align-items:flex-start;gap:14px;transition:all .2s;text-align:left;width:100%;line-height:1.5}
.opt-btn:hover:not(:disabled){border-color:var(--border2);background:var(--card);transform:translateX(4px)}
.opt-btn:disabled{cursor:default}
.opt-lbl{min-width:30px;height:30px;background:var(--border);border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;flex-shrink:0;transition:all .2s;margin-top:1px}
.opt-btn.correct-opt{background:rgba(34,197,94,.1);border-color:var(--green);animation:popIn .35s ease}
.opt-btn.correct-opt .opt-lbl{background:var(--green);color:#fff}
.opt-btn.wrong-opt{background:rgba(239,68,68,.08);border-color:var(--red);animation:shake .35s ease}
.opt-btn.wrong-opt .opt-lbl{background:var(--red);color:#fff}
.opt-btn.show-ans{background:rgba(34,197,94,.05);border-color:rgba(34,197,94,.4)}
.opt-btn.show-ans .opt-lbl{background:rgba(34,197,94,.35);color:#fff}

.feedback-box{border-radius:14px;padding:16px 20px;margin-top:14px;display:none;animation:fadeUp .25s ease}
.feedback-box.show-ok{display:block;background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.2)}
.feedback-box.show-err{display:block;background:rgba(239,68,68,.06);border:1px solid rgba(239,68,68,.18)}
.fb-title{font-size:14px;font-weight:700;margin-bottom:4px}
.fb-title.ok{color:var(--green)}
.fb-title.err{color:var(--red)}
.fb-body{font-size:13px;color:var(--muted);line-height:1.55}
.next-btn{display:none;width:100%;padding:15px;border:none;border-radius:13px;color:#fff;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;margin-top:14px}
.next-btn.show{display:block}
.next-btn:hover{transform:translateY(-2px);opacity:.88}

/* ─── STATS ROW ─── */
.live-stats{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.ls-chip{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:8px 14px;font-size:13px;display:flex;align-items:center;gap:6px}
.ls-num{font-family:'JetBrains Mono',monospace;font-weight:700}

/* ─── TEST MODE ─── */
.test-view{animation:fadeUp .3s ease}
.test-header{display:flex;align-items:center;gap:16px;margin-bottom:20px;flex-wrap:wrap}
.test-header h3{font-size:20px;font-weight:700;flex:1}
.timer-chip{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:8px 16px;font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:700;color:var(--gold)}
.timer-chip.urgent{color:var(--red);animation:pulse 1s ease infinite}

/* Test answer grid */
.test-nav-grid{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:24px;padding:16px;background:var(--card);border:1px solid var(--border);border-radius:16px}
.test-nav-btn{width:36px;height:36px;border-radius:8px;border:1.5px solid var(--border);background:var(--surface);font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;color:var(--muted)}
.test-nav-btn.answered{background:var(--acc1);border-color:var(--acc1);color:#fff}
.test-nav-btn.current{border-color:var(--gold);color:var(--gold)}
.test-q-counter{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted);text-align:center;margin-bottom:10px}

.test-opt-btn{background:var(--surface);border:1.5px solid var(--border);border-radius:14px;padding:14px 18px;color:var(--text);font-family:inherit;font-size:14px;cursor:pointer;display:flex;align-items:flex-start;gap:14px;transition:all .2s;text-align:left;width:100%;line-height:1.5;margin-bottom:10px}
.test-opt-btn:hover{border-color:var(--border2);background:var(--card);transform:translateX(4px)}
.test-opt-btn.selected{border-color:var(--acc1);background:rgba(99,102,241,.1)}
.test-opt-btn.selected .opt-lbl{background:var(--acc1);color:#fff}
.test-opt-btn.show-correct-t{border-color:var(--green);background:rgba(34,197,94,.08)}
.test-opt-btn.show-correct-t .opt-lbl{background:var(--green);color:#fff}
.test-opt-btn.show-wrong-t{border-color:var(--red);background:rgba(239,68,68,.08)}
.test-opt-btn.show-wrong-t .opt-lbl{background:var(--red);color:#fff}

.submit-test-btn{width:100%;padding:15px;background:linear-gradient(135deg,var(--acc1),var(--acc2));border:none;border-radius:13px;color:#fff;font-family:inherit;font-size:16px;font-weight:700;cursor:pointer;transition:all .2s;margin-top:10px}
.submit-test-btn:hover{transform:translateY(-2px);opacity:.9}

/* ─── RESULTS ─── */
.results-view{animation:fadeUp .4s ease;text-align:center;padding:40px 20px}
.results-trophy{font-size:72px;margin-bottom:16px;animation:bounce 1s ease infinite alternate}
.results-score{font-family:'JetBrains Mono',monospace;font-size:72px;font-weight:700;background:linear-gradient(135deg,var(--green),var(--acc2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
.results-grade{font-size:20px;font-weight:700;margin-bottom:6px}
.results-sub{color:var(--muted);font-size:14px;margin-bottom:32px}
.results-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:32px;text-align:center}
.r-chip{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px}
.r-chip .r-num{font-family:'JetBrains Mono',monospace;font-size:26px;font-weight:700;margin-bottom:4px}
.r-chip .r-lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
.results-actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.ra-btn{padding:13px 28px;border-radius:12px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s}
.ra-btn.primary{background:linear-gradient(135deg,var(--acc1),var(--acc2));border:none;color:#fff}
.ra-btn.primary:hover{transform:translateY(-2px);opacity:.88}
.ra-btn.secondary{background:var(--card);border:1.5px solid var(--border);color:var(--text)}
.ra-btn.secondary:hover{border-color:var(--border2)}

/* Review answers */
.review-list{text-align:left;margin-top:28px}
.review-tabs{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap}
.rv-tab{background:var(--card);border:1.5px solid var(--border);border-radius:10px;padding:8px 18px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;color:var(--muted)}
.rv-tab:hover{border-color:var(--border2);color:var(--text)}
.rv-tab.active-all{background:rgba(99,102,241,.15);border-color:var(--acc1);color:#818cf8}
.rv-tab.active-wrong{background:rgba(239,68,68,.12);border-color:var(--red);color:var(--red)}
.rv-tab.active-correct{background:rgba(34,197,94,.12);border-color:var(--green);color:var(--green)}
.review-item{border-radius:14px;padding:18px 20px;margin-bottom:10px;border:1.5px solid}
.review-item.rv-correct-item{background:rgba(34,197,94,.05);border-color:rgba(34,197,94,.2)}
.review-item.rv-wrong-item{background:rgba(239,68,68,.05);border-color:rgba(239,68,68,.2)}
.review-item.rv-skip-item{background:rgba(107,104,132,.07);border-color:var(--border)}
.rv-item-header{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.rv-badge{font-size:10px;font-weight:800;padding:3px 9px;border-radius:6px;letter-spacing:.5px;text-transform:uppercase;flex-shrink:0}
.rv-badge.ok{background:rgba(34,197,94,.2);color:var(--green)}
.rv-badge.err{background:rgba(239,68,68,.2);color:var(--red)}

.lrn-phase-badge{display:inline-flex;align-items:center;gap:8px;padding:5px 14px;border-radius:20px;font-size:11px;font-weight:800;letter-spacing:1px;text-transform:uppercase;margin-bottom:16px}
.lrn-round-info{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.lrn-round-label{font-size:12px;color:var(--muted);font-weight:600}
.lrn-round-val{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700}
.lrn-mastered-bar{background:var(--border);border-radius:6px;height:6px;margin-bottom:20px;overflow:hidden;position:relative}
.lrn-mastered-fill{height:100%;border-radius:6px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.lrn-mastered-text{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:6px}
.lrn-streak{display:inline-flex;align-items:center;gap:6px;background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.25);border-radius:10px;padding:5px 12px;font-size:13px;font-weight:700;color:var(--green)}

.round-complete-card h3{font-size:22px;font-weight:800;margin-bottom:8px}
.round-complete-card p{color:var(--muted);font-size:14px;line-height:1.6;margin-bottom:24px}
.rc-stats{display:flex;gap:12px;justify-content:center;margin-bottom:24px;flex-wrap:wrap}
.rc-stat{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 20px;text-align:center;min-width:90px}
.rc-stat .rcs-num{font-family:'JetBrains Mono',monospace;font-size:24px;font-weight:700;margin-bottom:4px}
.rc-stat .rcs-lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.rc-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}

.exp-box{margin-top:14px;border-radius:14px;padding:16px 20px;animation:fadeUp .25s ease;border:1.5px solid}

.exp-box.exp-err{background:rgba(239,68,68,.06);border-color:rgba(239,68,68,.2)}
.exp-title{font-size:14px;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.exp-title.ok{color:var(--green)}
.exp-title.err{color:var(--red)}
.exp-body{font-size:13px;color:var(--muted);line-height:1.7;white-space:pre-line}
.exp-body strong{color:var(--text);font-weight:700}
.part-divider{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 16px;margin:20px 0 14px;display:flex;align-items:center;gap:10px}

.part-divider h4{font-size:13px;font-weight:800;letter-spacing:.5px;text-transform:uppercase}

/* ─── COMPLETION ─── */
.completion-screen{display:none;text-align:center;padding:60px 20px;animation:fadeUp .4s ease}
.completion-screen.show{display:block}
.comp-trophy{font-size:80px;animation:bounce 1s ease infinite alternate;margin-bottom:16px}
.comp-score{font-family:'JetBrains Mono',monospace;font-size:64px;font-weight:700;background:linear-gradient(135deg,var(--green),var(--acc1));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin:0 0 8px}

/* ─── BACK BTN ─── */
.back-btn{background:var(--card);border:1.5px solid var(--border);border-radius:10px;padding:8px 16px;color:var(--muted);font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:6px}
.back-btn:hover{border-color:var(--border2);color:var(--text)}

/* ─── ANIMATIONS ─── */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes popIn{0%{transform:scale(1)}40%{transform:scale(1.025)}100%{transform:scale(1)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
@keyframes bounce{from{transform:translateY(0)}to{transform:translateY(-12px)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

/* Confetti */
.particle{position:fixed;width:8px;height:8px;border-radius:2px;pointer-events:none;z-index:1000;animation:fall linear forwards}
@keyframes fall{0%{transform:translateY(-20px) rotate(0);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}

/* ─── RESPONSIVE ─── */
@media(max-width:700px){
  .mode-grid{grid-template-columns:1fr}
  .topnav{padding:0 14px}
  .main{padding:20px 14px}
  .q-text{font-size:15px}
  .opt-btn,.test-opt-btn{font-size:13px;padding:12px 14px}
  .results-grid{grid-template-columns:repeat(2,1fr)}
  .nav-btn{padding:8px 10px;font-size:12px}
}

// ═══════════════════════════════════════
//  LEARN MODE — QUIZLET STYLE
//
//  Cơ chế vòng học:
//  • Chia câu thành NHÓM (mỗi nhóm 7 câu)
//  • Mỗi nhóm: học lần đầu → câu sai retake ngay
//  • Sau mỗi nhóm: ôn nhanh nhóm trước (5 câu)
//  • Câu trả lời đúng 2 lần liên tiếp = "mastered"
//  • Hoàn tất khi tất cả câu đều mastered
// ═══════════════════════════════════════
const LRN_GROUP = 7;       // số câu mỗi nhóm học mới
const LRN_REVIEW = 5;      // số câu ôn từ nhóm trước
const LRN_MASTER_NEED = 2; // số lần đúng liên tiếp để "mastered"

let lrn = {
  allQs: [],          // toàn bộ câu (đã shuffle)
  mastered: new Set(),// index câu đã thuộc
  streaks: {},        // {idx: số lần đúng liên tiếp hiện tại}

  // Trạng thái vòng hiện tại
  phase: 'new',       // 'new' | 'retry' | 'review' | 'done'
  groupStart: 0,      // bắt đầu nhóm mới từ index nào
  queue: [],          // hàng đợi câu hỏi cần làm trong phase này
  queueIdx: 0,

  // Thống kê tổng
  totalCorrect: 0,
  totalWrong: 0,
  roundNum: 1,        // vòng học thứ mấy

  // Câu sai trong phase 'new' hiện tại
  newWrong: [],

  // Câu để ôn từ nhóm trước
  reviewPool: [],
};

function startLearn(){
  activeMode = 'learn';
  const c = COURSES[activeCourse];
  const all = shuffle([...c.questions]);

  lrn.allQs = all.map((q,i)=>({...q, _origIdx:i}));
  lrn.mastered = new Set();
  lrn.streaks = {};
  lrn.totalCorrect = 0;
  lrn.totalWrong = 0;
  lrn.roundNum = 1;
  lrn.groupStart = 0;
  lrn.newWrong = [];
  lrn.reviewPool = [];

  beginNewGroup();
}

/* ── bắt đầu học nhóm mới ── */
function beginNewGroup(){
  // Lấy tối đa LRN_GROUP câu chưa mastered, bắt đầu từ groupStart
  const unmastered = lrn.allQs
    .map((q,i)=>i)
    .filter(i=>!lrn.mastered.has(i));

  if(unmastered.length === 0){ endLearnSession(); return; }

  // Lấy nhóm câu mới (kể từ groupStart, chưa mastered)
  const newBatch = unmastered.slice(lrn.groupStart, lrn.groupStart + LRN_GROUP);
  if(newBatch.length === 0){
    // Đã học hết nhóm mới, chuyển sang ôn toàn bộ câu còn chưa mastered
    lrn.groupStart = 0;
    const remaining = lrn.allQs.map((_,i)=>i).filter(i=>!lrn.mastered.has(i));
    lrn.queue = shuffle([...remaining]);
    lrn.queueIdx = 0;
    lrn.phase = 'retry';
    lrn.newWrong = [];
    renderLearnQ();
    return;
  }

  lrn.phase = 'new';
  lrn.queue = [...newBatch];
  lrn.queueIdx = 0;
  lrn.newWrong = [];
  renderLearnQ();
}

/* ── sau khi xong phase 'new': retake câu sai ── */
function beginRetryPhase(){
  if(lrn.newWrong.length === 0){
    // Không có câu sai → chuyển sang ôn nhóm trước
    afterRetry();
    return;
  }
  lrn.phase = 'retry';
  lrn.queue = shuffle([...lrn.newWrong]);
  lrn.queueIdx = 0;
  renderLearnQ();
}

/* ── sau khi retry xong → ôn nhanh câu từ nhóm trước ── */
function afterRetry(){
  // Cộng groupStart lên để sang nhóm tiếp theo
  lrn.groupStart += LRN_GROUP;

  // Chọn câu ôn từ các câu đã học trước đó (chưa mastered vẫn ưu tiên)
  const prevLearned = lrn.allQs
    .map((_,i)=>i)
    .filter(i=> i < lrn.groupStart && !lrn.mastered.has(i));

  if(prevLearned.length > 0){
    lrn.reviewPool = shuffle([...prevLearned]).slice(0, LRN_REVIEW);
    lrn.phase = 'review';
    lrn.queue = [...lrn.reviewPool];
    lrn.queueIdx = 0;
    lrn.roundNum++;
    renderLearnQ();
  } else {
    // Không có gì để ôn → học tiếp nhóm mới
    beginNewGroup();
  }
}

/* ── kết thúc toàn bộ session ── */
function endLearnSession(){
  const c = COURSES[activeCourse];
  const total = lrn.allQs.length;
  const masteredCount = lrn.mastered.size;
  const pct = Math.round(masteredCount/total*100);

  session[activeCourse].correct += lrn.totalCorrect;
  session[activeCourse].wrong   += lrn.totalWrong;
  session[activeCourse].learned  = total;

  document.getElementById('mainArea').innerHTML = `
  <div class="completion-screen show">
    <div class="comp-trophy">🏆</div>
    <div class="comp-score">${pct}%</div>
    <h2 style="font-size:22px;font-weight:800;margin-bottom:6px">Đã thuộc ${masteredCount}/${total} câu!</h2>
    <p style="color:var(--muted);margin-bottom:24px">${c.code} · ${lrn.totalCorrect} đúng · ${lrn.totalWrong} sai</p>
    <div class="results-actions">
      <button class="ra-btn primary" onclick="startLearn()">🔄 Học lại từ đầu</button>
      <button class="ra-btn secondary" onclick="showCourseHome()">← Về trang chủ</button>
    </div>
  </div>`;
  for(let i=0;i<50;i++) setTimeout(()=>confetti(true), i*40);
}

/* ── render câu hỏi hiện tại ── */
function renderLearnQ(){
  const c = COURSES[activeCourse];
  const total = lrn.allQs.length;
  const masteredCount = lrn.mastered.size;
  const masteredPct = total>0 ? (masteredCount/total*100).toFixed(1) : 0;
  const labels = ['A','B','C','D','E'];

  // Kiểm tra xong queue
  if(lrn.queueIdx >= lrn.queue.length){
    if(lrn.phase === 'new')    { beginRetryPhase(); return; }
    if(lrn.phase === 'retry')  { afterRetry();      return; }
    if(lrn.phase === 'review') { beginNewGroup();   return; }
    return;
  }

  const qIdx = lrn.queue[lrn.queueIdx];
  const q = lrn.allQs[qIdx];

  // Badge phase
  const phaseLabel = lrn.phase==='new'
    ? `📖 Học mới · Nhóm ${Math.floor(lrn.groupStart/LRN_GROUP)+1}`
    : lrn.phase==='retry'
    ? '🔁 Ôn lại câu sai'
    : `⭐ Ôn tổng hợp · Vòng ${lrn.roundNum}`;
  const phaseColor = lrn.phase==='new'
    ? c.color
    : lrn.phase==='retry'
    ? 'var(--red)'
    : 'var(--gold)';
  const phaseBg = lrn.phase==='new'
    ? c.badge
    : lrn.phase==='retry'
    ? 'rgba(239,68,68,.15)'
    : 'rgba(245,158,11,.15)';

  const qInQueue = lrn.queueIdx + 1;
  const qTotal   = lrn.queue.length;
  const streak   = lrn.streaks[qIdx] || 0;
  const streakHTML = streak>0
    ? `<span class="lrn-streak">🔥 ${streak} lần đúng</span>`
    : '';

  document.getElementById('mainArea').innerHTML = `
  <div class="learn-view">
    <div class="lrn-header">
      <button class="back-btn" onclick="showCourseHome()">← Về trang chủ</button>
      <h3>🧠 Học</h3>
      <div class="ls-chip">✅ <span class="ls-num" style="color:var(--green)">${lrn.totalCorrect}</span></div>
      <div class="ls-chip">❌ <span class="ls-num" style="color:var(--red)">${lrn.totalWrong}</span></div>
    </div>

    <div class="lrn-mastered-text">
      <span>Đã thuộc: <strong style="color:${c.textBadge}">${masteredCount} / ${total}</strong></span>
      <span style="color:var(--muted)">${masteredPct}%</span>
    </div>
    <div class="lrn-mastered-bar"><div class="lrn-mastered-fill" style="width:${masteredPct}%;background:${c.color}"></div></div>

    <div class="lrn-round-info">
      <div>
        <span class="lrn-phase-badge" style="background:${phaseBg};color:${phaseColor}">${phaseLabel}</span>
        ${streakHTML}
      </div>
      <span class="lrn-round-val" style="color:var(--muted)">${qInQueue} / ${qTotal}</span>
    </div>

    <div class="q-card" id="qCard">
      <style>#qCard::before{background:${phaseColor}!important}</style>
      <div class="q-num" style="color:${phaseColor}">CÂU ${qInQueue}/${qTotal} · ${c.code}</div>
      <div class="q-text">${q.q}</div>
      <div class="opts" id="optsContainer">
        ${q.opts.map((o,i)=>`
        <button class="opt-btn" onclick="checkLearnQ(${i},${q.ans},${qIdx},this)">
          <span class="opt-lbl">${labels[i]}</span>
          <span>${o}</span>
        </button>`).join('')}
      </div>
      <div class="feedback-box" id="fb">
        <div class="fb-title" id="fbTitle"></div>
        <div class="fb-body" id="fbBody"></div>
      </div>
    </div>
    <button class="next-btn" id="nextLrnBtn" style="background:linear-gradient(135deg,${phaseColor},${phaseColor}99)" onclick="advanceLrn()">
      Câu tiếp theo →
    </button>
  </div>`;

  document.onkeydown = null;
}

function checkLearnQ(sel, correct, qIdx, btn){
  document.querySelectorAll('.opt-btn').forEach(b=>b.disabled=true);
  const labels=['A','B','C','D','E'];
  const fb=document.getElementById('fb'), fbT=document.getElementById('fbTitle'), fbB=document.getElementById('fbBody');

  if(sel === correct){
    lrn.totalCorrect++;
    // Tăng streak
    lrn.streaks[qIdx] = (lrn.streaks[qIdx] || 0) + 1;
    // Kiểm tra mastered
    if(lrn.streaks[qIdx] >= LRN_MASTER_NEED){
      lrn.mastered.add(qIdx);
    }
    btn.classList.add('correct-opt');
    fb.className='feedback-box show-ok';
    fbT.className='fb-title ok';
    const isMastered = lrn.mastered.has(qIdx);
    fbT.textContent = isMastered ? '⭐ Đã thuộc!' : '✅ Chính xác!';
    const enc=['Tuyệt vời!','Xuất sắc!','Chính xác!','Perfect!','Đúng rồi!'];
    fbB.textContent = isMastered
      ? `Bạn đã trả lời đúng ${LRN_MASTER_NEED} lần liên tiếp — câu này được đánh dấu thuộc! 🎯`
      : enc[Math.floor(Math.random()*enc.length)];
    confetti();
  } else {
    lrn.totalWrong++;
    lrn.streaks[qIdx] = 0;
    if(lrn.phase === 'new' && !lrn.newWrong.includes(qIdx)){
      lrn.newWrong.push(qIdx);
    }
    btn.classList.add('wrong-opt');
    document.querySelectorAll('.opt-btn')[correct].classList.add('show-ans');
    fb.className='feedback-box show-err';
    fbT.className='fb-title err'; fbT.textContent='❌ Chưa đúng!';
    fbB.innerHTML=`Đáp án đúng: <strong style="color:var(--green)">${labels[correct]}. ${lrn.allQs[qIdx].opts[correct]}</strong> — Sẽ được ôn lại!`;
  }
  // Show explanation if available
  const expQ = lrn.allQs[qIdx];
  if(expQ.exp){
    const expDiv = document.createElement('div');
    expDiv.className = 'exp-box ' + (sel===correct ? 'exp-ok' : 'exp-err');
    const expHtml = expQ.exp.split('\n').join('<br>').replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
    expDiv.innerHTML = `<div class="exp-title ${sel===correct?'ok':'err'}">💡 Giải thích</div><div class="exp-body">${expHtml}</div>`;
    document.getElementById('fb').after(expDiv);
  }

  session[activeCourse].learned = Math.max(session[activeCourse].learned, lrn.mastered.size);
  document.getElementById('nextLrnBtn').className='next-btn show';
}

function advanceLrn(){
  lrn.queueIdx++;
  renderLearnQ();
}

// ═══════════════════════════════════════
//  TEST MODE (40 câu ngẫu nhiên + tính giờ)
// ═══════════════════════════════════════
const TEST_COUNT = 40;
const TEST_SECS = 40 * 60; // 40 phút
let test = { qs:[], answers:[], curQ:0, timer:null, timeLeft:0, submitted:false };

function startTest(){
  activeMode = 'test';
  const c = COURSES[activeCourse];
  test.qs = shuffle([...c.questions]).slice(0, TEST_COUNT);
  test.answers = new Array(TEST_COUNT).fill(null);
  test.curQ = 0;
  test.submitted = false;
  test.timeLeft = TEST_SECS;
  if(test.timer) clearInterval(test.timer);
  test.timer = setInterval(tickTimer, 1000);
  renderTest();
}

function tickTimer(){
  test.timeLeft--;
  const el = document.getElementById('timerEl');
  if(el){
    el.textContent = formatTime(test.timeLeft);
    if(test.timeLeft<=120) el.className='timer-chip urgent';
  }
  if(test.timeLeft<=0){ submitTest(true); }
}

function formatTime(s){
  const m=Math.floor(s/60), sec=s%60;
  return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
}

function renderTest(){
  const c = COURSES[activeCourse];
  const q = test.qs[test.curQ];
  const labels = ['A','B','C','D','E'];
  const answered = test.answers.filter(a=>a!==null).length;

  document.getElementById('mainArea').innerHTML = `
  <div class="test-view">
    <div class="test-header">
      <button class="back-btn" onclick="abortTest()">← Thoát</button>
      <h3>📝 Kiểm Tra Thử · ${c.code}</h3>
      <div class="ls-chip">✅ ${answered}/${TEST_COUNT}</div>
      <div class="timer-chip" id="timerEl" style="${test.timeLeft<=120?'color:var(--red)':''}">${formatTime(test.timeLeft)}</div>
    </div>

    <div class="test-nav-grid" id="testNavGrid">
      ${test.qs.map((_,i)=>`
        <button class="test-nav-btn ${test.answers[i]!==null?'answered':''} ${i===test.curQ?'current':''}"
          onclick="jumpTestQ(${i})">${i+1}</button>`).join('')}
    </div>

    <div class="test-q-counter">CÂU ${test.curQ+1} / ${TEST_COUNT}</div>

    <div class="q-card">
      <style>#qCard2::before{background:${c.color}!important}</style>
      <div class="q-num">CÂU ${test.curQ+1} · ${c.code}</div>
      <div class="q-text">${q.q}</div>
      ${q.opts.map((o,i)=>`
      <button class="test-opt-btn ${test.answers[test.curQ]===i?'selected':''}" onclick="selectTestAns(${i})">
        <span class="opt-lbl">${labels[i]}</span>
        <span>${o}</span>
      </button>`).join('')}
    </div>

    <div style="display:flex;gap:10px;flex-wrap:wrap">
      <button class="fc-btn" onclick="jumpTestQ(test.curQ-1)" ${test.curQ===0?'disabled':''} style="flex:1">← Trước</button>
      <button class="fc-btn" onclick="jumpTestQ(test.curQ+1)" ${test.curQ===TEST_COUNT-1?'disabled':''} style="flex:1">Tiếp →</button>
    </div>
    <button class="submit-test-btn" onclick="submitTest(false)" style="background:linear-gradient(135deg,${c.color},${c.colorName}80);margin-top:12px">
      Nộp Bài (${answered}/${TEST_COUNT} câu đã chọn)
    </button>
  </div>`;
  document.onkeydown = null;
}

function selectTestAns(i){
  test.answers[test.curQ] = i;
  renderTest();
}
function jumpTestQ(i){
  if(i<0||i>=TEST_COUNT) return;
  test.curQ=i;
  renderTest();
}
function abortTest(){
  if(!confirm('Thoát bài kiểm tra? Kết quả sẽ bị mất.')) return;
  if(test.timer) clearInterval(test.timer);
  showCourseHome();
}

function submitTest(autoSubmit){
  if(!autoSubmit){
    const unanswered = test.answers.filter(a=>a===null).length;
    if(unanswered>0 && !confirm(`Còn ${unanswered} câu chưa trả lời. Nộp bài không?`)) return;
  }
  if(test.timer) clearInterval(test.timer);
  test.submitted = true;
  showTestResults();
}

function showTestResults(){
  const c = COURSES[activeCourse];
  let correct=0, wrong=0, skipped=0;
  const labels=['A','B','C','D','E'];

  // Build full result list for all 40 questions
  const allResults = test.qs.map((q,i)=>{
    const a = test.answers[i];
    let status;
    if(a===null){ skipped++; status='skip'; }
    else if(a===q.ans){ correct++; status='correct'; }
    else { wrong++; status='wrong'; }
    return {q, userAns:a, idx:i, status};
  });

  const pct = Math.round(correct/TEST_COUNT*100);
  const grade = pct>=90?'A (Xuất sắc)':pct>=80?'B (Giỏi)':pct>=70?'C (Khá)':pct>=60?'D (Trung bình)':'F (Chưa đạt)';
  const gradeColor = pct>=80?'var(--green)':pct>=60?'var(--gold)':'var(--red)';

  session[activeCourse].correct += correct;
  session[activeCourse].wrong += wrong;

  // Build one review card per question (showing all answer options)
  function buildReviewCard(item){
    const {q, userAns, idx, status} = item;
    const badgeClass = status==='correct'?'ok':status==='wrong'?'err':'skip';
    const badgeText = status==='correct'?'✓ Đúng':status==='wrong'?'✗ Sai':'— Bỏ qua';
    const cardClass = status==='correct'?'rv-correct-item':status==='wrong'?'rv-wrong-item':'rv-skip-item';

    const optsHTML = q.opts.map((opt,oi)=>{
      let cls='rv-opt opt-neutral';
      if(status==='correct' && oi===q.ans) cls='rv-opt opt-user-correct';
      else if(status==='wrong'){
        if(oi===userAns) cls='rv-opt opt-user-wrong';
        else if(oi===q.ans) cls='rv-opt opt-answer';
      } else if(status==='skip' && oi===q.ans) cls='rv-opt opt-answer';
      return `<div class="${cls}"><span class="rv-lbl">${labels[oi]}</span><span>${opt}</span></div>`;
    }).join('');

    return `<div class="review-item ${cardClass}" data-status="${status}">
      <div class="rv-item-header">
        <span class="rv-qnum">CÂU ${idx+1}</span>
        <span class="rv-badge ${badgeClass}">${badgeText}</span>
      </div>
      <div class="rv-q">${q.q}</div>
      <div class="rv-opts">${optsHTML}</div>
    </div>`;
  }

  const allHTML = allResults.map(buildReviewCard).join('');

  document.getElementById('mainArea').innerHTML = `
  <div class="results-view">
    <div class="results-trophy">${pct>=80?'🏆':pct>=60?'📊':'📚'}</div>
    <div class="results-score">${pct}%</div>
    <div class="results-grade" style="color:${gradeColor}">${grade}</div>
    <div class="results-sub">Bài kiểm tra ${c.code} · ${TEST_COUNT} câu</div>

    <div class="results-grid">
      <div class="r-chip"><div class="r-num" style="color:var(--green)">${correct}</div><div class="r-lbl">Đúng</div></div>
      <div class="r-chip"><div class="r-num" style="color:var(--red)">${wrong}</div><div class="r-lbl">Sai</div></div>
      <div class="r-chip"><div class="r-num" style="color:var(--muted)">${skipped}</div><div class="r-lbl">Bỏ qua</div></div>
    </div>

    <div class="results-actions">
      <button class="ra-btn primary" onclick="startTest()">🔄 Kiểm tra lại</button>
      <button class="ra-btn secondary" onclick="showCourseHome()">← Về trang chủ</button>
    </div>

    <div class="review-list">
      <h3 style="font-size:16px;font-weight:700;margin-bottom:14px;text-align:left">📋 Chi tiết tất cả ${TEST_COUNT} câu</h3>
      <div class="review-tabs">
        <button class="rv-tab active-all" onclick="filterReview('all',this)">Tất cả (${TEST_COUNT})</button>
        <button class="rv-tab" onclick="filterReview('correct',this)">✓ Đúng (${correct})</button>
        <button class="rv-tab" onclick="filterReview('wrong',this)">✗ Sai (${wrong})</button>
        ${skipped>0?`<button class="rv-tab" onclick="filterReview('skip',this)">— Bỏ qua (${skipped})</button>`:''}
      </div>
      <div id="reviewItems">${allHTML}</div>
    </div>
  </div>`;

  if(pct>=80) for(let i=0;i<50;i++) setTimeout(()=>confetti(true), i*40);
}

function filterReview(type, btn){
  // Update active tab style
  document.querySelectorAll('.rv-tab').forEach(t=>{
    t.classList.remove('active-all','active-wrong','active-correct');
  });
  if(type==='all') btn.classList.add('active-all');
  else if(type==='wrong') btn.classList.add('active-wrong');
  else if(type==='correct') btn.classList.add('active-correct');

  // Show/hide items
  document.querySelectorAll('#reviewItems .review-item').forEach(el=>{
    el.style.display = (type==='all' || el.dataset.status===type) ? '' : 'none';
  });
}

// ═══════════════════════════════════════
//  UTILS
// ═══════════════════════════════════════
function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}

function confetti(big=false){
  const colors=['#6366f1','#0ea5e9','#10b981','#f59e0b','#f43f5e'];
  const n = big?3:1;
  for(let i=0;i<n;i++){
    const p=document.createElement('div');
    p.className='particle';
    p.style.cssText=`left:${Math.random()*100}vw;top:-20px;background:${colors[Math.floor(Math.random()*colors.length)]};animation-duration:${1.5+Math.random()*2}s;width:${6+Math.random()*8}px;height:${6+Math.random()*8}px`;
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),4000);
  }
}
</script>

<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ACC101 NEW SP26 — Ôn Thi Trắc Nghiệm</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Sora:wght@300;400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --card: #1a1a26;
    --border: #2a2a3d;
    --accent: #7c5cfc;
    --accent2: #fc5c7d;
    --correct: #22c55e;
    --wrong: #ef4444;
    --text: #e8e8f0;
    --muted: #6b6b8a;
    --gold: #f4c430;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Sora', sans-serif; min-height: 100vh; overflow-x: hidden; }
  body::before { content: ''; position: fixed; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(ellipse at 20% 20%, rgba(124,92,252,0.08) 0%, transparent 50%), radial-gradient(ellipse at 80% 80%, rgba(252,92,125,0.06) 0%, transparent 50%); pointer-events: none; z-index: 0; }
  .container { max-width: 800px; margin: 0 auto; padding: 20px; position: relative; z-index: 1; }
  .header { text-align: center; padding: 40px 0 30px; }
  .header .badge { display: inline-block; background: linear-gradient(135deg, var(--accent), var(--accent2)); color: white; font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 3px; padding: 6px 16px; border-radius: 20px; margin-bottom: 16px; text-transform: uppercase; }
  .header h1 { font-size: clamp(28px, 5vw, 48px); font-weight: 800; background: linear-gradient(135deg, #fff 0%, var(--accent) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; line-height: 1.1; margin-bottom: 10px; }
  .header p { color: var(--muted); font-size: 14px; font-weight: 300; }
  .stats-bar { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
  .stat { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 12px 18px; flex: 1; min-width: 100px; text-align: center; }
  .stat-num { font-family: 'Space Mono', monospace; font-size: 22px; font-weight: 700; color: var(--accent); }
  .stat-num.correct-num { color: var(--correct); }
  .stat-num.wrong-num { color: var(--wrong); }
  .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }
  .progress-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px 20px; margin-bottom: 24px; }
  .progress-info { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 13px; }
  .progress-info span:first-child { color: var(--muted); }
  .progress-info span:last-child { font-family: 'Space Mono', monospace; color: var(--accent); }
  .progress-bar { background: var(--border); border-radius: 10px; height: 8px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 10px; transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
  .question-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 32px; margin-bottom: 20px; position: relative; overflow: hidden; animation: slideIn 0.4s ease; }
  @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  .question-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, var(--accent), var(--accent2)); }
  .q-number { font-family: 'Space Mono', monospace; font-size: 12px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 16px; }
  .q-text { font-size: 16px; font-weight: 600; line-height: 1.65; color: var(--text); margin-bottom: 28px; }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .option-btn { background: var(--surface); border: 1.5px solid var(--border); border-radius: 14px; padding: 15px 20px; color: var(--text); font-family: 'Sora', sans-serif; font-size: 14px; cursor: pointer; display: flex; align-items: flex-start; gap: 14px; transition: all 0.2s ease; text-align: left; width: 100%; line-height: 1.5; }
  .option-btn:hover:not(:disabled) { border-color: var(--accent); background: rgba(124,92,252,0.08); transform: translateX(4px); }
  .option-btn:disabled { cursor: default; }
  .option-label { min-width: 32px; height: 32px; background: var(--border); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-family: 'Space Mono', monospace; font-size: 13px; font-weight: 700; flex-shrink: 0; transition: all 0.2s; margin-top: 1px; }
  .option-btn.correct { background: rgba(34,197,94,0.12); border-color: var(--correct); animation: correctPop 0.4s ease; }
  .option-btn.correct .option-label { background: var(--correct); color: white; }
  @keyframes correctPop { 0% { transform: scale(1); } 40% { transform: scale(1.02); } 100% { transform: scale(1); } }
  .option-btn.wrong { background: rgba(239,68,68,0.1); border-color: var(--wrong); animation: wrongShake 0.4s ease; }
  .option-btn.wrong .option-label { background: var(--wrong); color: white; }
  @keyframes wrongShake { 0%, 100% { transform: translateX(0); } 20% { transform: translateX(-6px); } 40% { transform: translateX(6px); } 60% { transform: translateX(-4px); } 80% { transform: translateX(4px); } }
  .option-btn.show-correct { background: rgba(34,197,94,0.08); border-color: rgba(34,197,94,0.5); }
  .option-btn.show-correct .option-label { background: rgba(34,197,94,0.4); color: white; }
  .feedback { border-radius: 14px; padding: 18px 22px; margin-top: 16px; display: none; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .feedback.correct-fb { display: block; background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); }
  .feedback.wrong-fb { display: block; background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.25); }
  .feedback-title { font-weight: 700; font-size: 15px; margin-bottom: 6px; display: flex; align-items: center; gap: 8px; }
  .feedback-title.correct-title { color: var(--correct); }
  .feedback-title.wrong-title { color: var(--wrong); }
  .feedback-body { font-size: 13px; color: var(--muted); line-height: 1.6; }
  .next-btn { display: none; width: 100%; padding: 16px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border: none; border-radius: 14px; color: white; font-family: 'Sora', sans-serif; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 16px; transition: all 0.2s; letter-spacing: 0.5px; }
  .next-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(124,92,252,0.4); }
  .next-btn.visible { display: block; }
  .controls { display: flex; gap: 10px; margin-bottom: 24px; flex-wrap: wrap; }
  .ctrl-btn { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 10px 18px; color: var(--muted); font-family: 'Sora', sans-serif; font-size: 13px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 6px; }
  .ctrl-btn:hover, .ctrl-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(124,92,252,0.08); }
  .completion { display: none; text-align: center; padding: 60px 20px; animation: slideIn 0.5s ease; }
  .completion.visible { display: block; }
  .completion .trophy { font-size: 72px; margin-bottom: 20px; animation: bounce 1s ease infinite alternate; }
  @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-12px); } }
  .completion h2 { font-size: 36px; font-weight: 800; background: linear-gradient(135deg, var(--gold), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 10px; }
  .completion p { color: var(--muted); margin-bottom: 30px; }
  .score-big { font-family: 'Space Mono', monospace; font-size: 64px; font-weight: 700; background: linear-gradient(135deg, var(--correct), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 30px; }
  .restart-btn { background: linear-gradient(135deg, var(--accent), var(--accent2)); border: none; border-radius: 14px; color: white; font-family: 'Sora', sans-serif; font-size: 16px; font-weight: 600; padding: 16px 40px; cursor: pointer; transition: all 0.2s; }
  .restart-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(124,92,252,0.5); }
  .particle { position: fixed; width: 8px; height: 8px; border-radius: 2px; pointer-events: none; z-index: 999; animation: fall linear forwards; }
  @keyframes fall { 0% { transform: translateY(-20px) rotate(0deg); opacity: 1; } 100% { transform: translateY(110vh) rotate(720deg); opacity: 0; } }
  @media (max-width: 600px) { .question-card { padding: 20px; } .q-text { font-size: 14px; } .option-btn { font-size: 13px; padding: 12px 14px; } .stats-bar .stat { min-width: 70px; } }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="badge">✦ Quizlet Mode ✦</div>
    <h1>ACC101 NEW SP26<br>Ôn Thi Cuối Kỳ</h1>
    <p>234 câu hỏi trắc nghiệm · Click đáp án để kiểm tra</p>
  </div>

  <div class="stats-bar">
    <div class="stat"><div class="stat-num" id="totalStat">234</div><div class="stat-label">Tổng câu</div></div>
    <div class="stat"><div class="stat-num" id="doneStat">0</div><div class="stat-label">Đã trả lời</div></div>
    <div class="stat"><div class="stat-num correct-num" id="correctStat">0</div><div class="stat-label">Đúng ✓</div></div>

    <div class="progress-info"><span>Tiến độ</span><span id="progressText">0 / 234</span></div>

<script>
const ALL_QUESTIONS = [
  {q:"At the beginning of January, Thomas Law Center's ledger reflected a normal balance of $52,000 for accounts receivable. During January, the company collected $14,800 from customers on account and provided additional services to customers on account totaling $12,500. Additionally, one customer paid Thomas $5,000 for services to be provided in the future. At the end of January, the balance in the accounts receivable account should be:",opts:["$54,700","$49,700","$47,000","$64,500"],ans:1},
  {q:"When bonds are issued at a premium, the stated interest rate is:",opts:["Lower than the market rate","Equal to the market rate","Higher than the market rate","Unrelated to the market rate"],ans:2},
  {q:"Which of the following normally reduces retained earnings?",opts:["Net income earned during the year","Declaration of cash dividends","Issuance of additional common stock","Stock split"],ans:1},
  {q:"When a corporation issues par value stock at its par value, what is the primary effect on the company's accounting equation?",opts:["Assets decrease and Equity increases","Assets increase and Liabilities decrease","Assets increase and Equity increases","Liabilities increase and Equity decreases"],ans:2},
  {q:"What is the primary role of a registrar in a corporation?",opts:["To assist investors in trading company shares on the stock exchange","To maintain a list of stockholders and handle dividend payments","To issue physical stock certificates for all public companies","To transfer shares between companies during mergers"],ans:1},
  {q:"Which of the following is an advantage of the corporate form of organization?",opts:["Double taxation","Limited liability of stockholders","Mutual agency of owners","Unlimited liability of owners"],ans:1},
  {q:"Which of the following best describes 'known liabilities'?",opts:["Obligations whose amounts and timing are uncertain","Obligations created only through litigation","Obligations that are measurable and certain, such as accounts payable or notes payable","Obligations payable only at liquidation"],ans:2},
  {q:"If net income is $50,000 and dividends are $10,000, retained earnings will:",opts:["Increase by $40,000","Increase by $60,000","Decrease by $40,000","Decrease by $60,000"],ans:0},
  {q:"When ending inventory is overstated:",opts:["Net income is overstated","Net income is understated","COGS is overstated","Assets are understated"],ans:0},
  {q:"Sales discounts under perpetual system:",opts:["Reduce inventory cost","Reduce revenue received","Increase sales revenue","Increase accounts receivable"],ans:1},
  {q:"Perpetual system advantages include:",opts:["Real-time inventory tracking","Lower bookkeeping costs","Simpler periodic calculation","Ignoring cost of goods sold"],ans:0},
  {q:"On September 1, Hoa Binh Company borrows $10,000 from ACB Bank by signing a 60-day, 6% note. What is the correct journal entry to record the payment of the note at maturity?",opts:["Debit Notes Payable $10,000; Credit Cash $10,000","Debit Notes Payable $10,000; Credit Interest Expense $100; Credit Cash $9,900","Debit Notes Payable $10,000; Debit Interest Expense $100; Credit Cash $10,100","Debit Interest Expense $100; Credit Notes Payable $10,100"],ans:2},
  {q:"Stock that does not have a stated value in the corporate charter is referred to as:",opts:["Par Value Stock","Common Stock","Stated Value Stock","No-Par Value Stock"],ans:3},
  {q:"What is recorded when a corporation issues stock at a premium?",opts:["Paid-in capital in excess of par value is reported as revenue","The excess amount over par value is listed under liabilities","Paid-in capital in excess of par value is reported as part of equity","The premium is recorded under operating expenses"],ans:2},
  {q:"What is the bond interest rate called, which is also known as the coupon rate or stated rate?",opts:["Market rate","Premium rate","Contract rate","Discount rate"],ans:2},
  {q:"Which of the following statements is true regarding bond interest?",opts:["Interest on bonds is tax deductible","Interest on bonds is not tax deductible","Dividends to stockholders are tax deductible","Bonds do not have to be repaid"],ans:0},
  {q:"A company using a periodic inventory system had a beginning inventory of $20,000. During the period, they purchased merchandise worth $60,000. At the end of the period, the physical count of inventory was $15,000. Calculate the cost of goods sold for the period.",opts:["$75,000","$65,000","$60,000","$55,000"],ans:1},
  {q:"All of the following statements regarding long-term liabilities are true EXCEPT:",opts:["Liabilities not expected to be paid within one year are reported as long-term liabilities","Long-term liabilities include long-term notes payable, warranty liabilities, lease liabilities, and bonds payable","Liabilities that do not have a fixed due date, but are payable on demand, are reported as long-term liabilities","Long-term liabilities can be reported on the balance sheet in a single total or in multiple categories"],ans:2},
  {q:"What is the tax advantage of bond interest payments?",opts:["Bond interest payments are exempt from taxation","Bond interest payments are taxed at a lower rate than equity earnings","Bond interest payments are tax deductible, reducing taxable income","Bond interest payments are tax-free for the company"],ans:2},
  {q:"A corporation's distribution of additional shares of its own stock to its stockholders without the receipt of any payment in return is called a:",opts:["Stock dividend","Stock subscription","Premium on stock","Discount on stock"],ans:0},
  {q:"Which accounting principle is primarily supported by the lower of cost or market (LCM) rule?",opts:["Matching principle","Historical cost principle","Consistency principle","Conservatism principle"],ans:3},
  {q:"Shares of stock that have been issued by the corporation and are currently in the hands of investors are called:",opts:["Authorized Stock","Treasury Stock","Selling (issuing) Stock","Outstanding Stock"],ans:3},
  {q:"If a bond has a contract rate of 8% on a $1,000 bond, how much annual interest will it pay?",opts:["$100","$80","$40","$1,000"],ans:1},
  {q:"What is the primary disadvantage of bond financing related to a company's return on equity?",opts:["Bonds increase the company's return on equity","Bonds can decrease the company's return on equity if the company has lower income","Bonds allow the company to withdraw dividends freely","Bonds do not require interest payments"],ans:1},
  {q:"What is the total preferred stock value on Dillon's balance sheet for the issuance of preferred stock at $100 par value for 50 shares?",opts:["$1,000","$5,000","$6,000","$10,000"],ans:1},
  {q:"A corporation issued 10,000 shares of its $5 par value common stock in exchange for equipment that has a market value of $120,000. The entry to record this transaction would include:",opts:["A debit to Common Stock for $50,000","A debit to Land for $50,000","A credit to Equipment for $50,000","A credit to Paid-in Capital in Excess of Par Value, Common Stock for $70,000"],ans:3},
  {q:"A corporation sold 14,000 shares of its $1 par value common stock at a cash price of $13 per share. The entry to record this transaction would include:",opts:["A debit to Paid-in Capital in Excess of Par Value for $182,000","A debit to Cash for $14,000","A credit to Common Stock for $182,000","A credit to Common Stock for $14,000"],ans:3},
  {q:"Which statement about no-par value stock is correct?",opts:["It must have a stated value","It cannot be legally issued in most states","It is not assigned a value per share by the charter","It requires a minimum dividend"],ans:2},
  {q:"The total value of the owners' stake in the corporation is best represented by:",opts:["Market Capitalization","Authorized Capital","Paid-In Capital","Stockholders' Equity"],ans:3},
  {q:"What is the primary purpose of a purchase discount?",opts:["To increase sales","To encourage prompt payment","To inflate revenue","To reduce cost of goods sold"],ans:1},
  {q:"Which of the following statements regarding liabilities is NOT true?",opts:["A liability is a probable future payment of assets or services","Unearned future wages to be paid to employees should be recorded as liabilities","For a liability to be reported, it must be a present obligation from a past transaction and requires a future payment","Information about liabilities is more useful when the balance sheet identifies them as either current or long term"],ans:1},
  {q:"Companies report the cost of stock options in the:",opts:["Statement of cash flows","Balance sheet","Statement of retained earnings","Income statement"],ans:3},
  {q:"A discount on bonds payable:",opts:["Occurs when a company issues bonds with a contract rate less than the market rate","Occurs when a company issues bonds with a contract rate more than the market rate","Increases the Bond Payable account","Decreases the total bond interest expense"],ans:0},
  {q:"A company received cash proceeds of $206,948 on a bond issue with a par value of $200,000. The difference between par value and issue price for this bond is recorded as a:",opts:["Credit to Interest Income","Credit to Premium on Bonds Payable","Credit to Discount on Bonds Payable","Debit to Premium on Bonds Payable"],ans:1},
  {q:"A bond is issued at par value when:",opts:["The bond pays no interest","The bond is not between interest payment dates","Straight line amortization is used by the company","The market rate of interest is the same as the contract rate"],ans:3},
  {q:"Accounts payable are amounts owed to suppliers for products and/or services purchased on credit. Which of these is correct?",opts:["Amounts owed to suppliers for products and/or services purchased on credit","Estimated liabilities","Long-term liabilities","Always payable within 60 days"],ans:0},
  {q:"An adjusting entry for unearned revenue affects:",opts:["Assets and expenses","Assets and revenues","Revenue and Liabilities","Expenses and Liabilities"],ans:2},
  {q:"Statement of retained earnings does not include:",opts:["Dividends paid","Transfer to general reserves","Prior period adjustments","Revaluation of long-term investments"],ans:3},
  {q:"The inventory system that updates the accounting records for merchandise transactions only at the end of a period is called:",opts:["FIFO inventory system","Specific identification inventory system","Weighted inventory system","Periodic inventory system"],ans:3},
  {q:"The amount due on the maturity date of a $12,000, 60-day, 8% note receivable is:",opts:["$6,000","$12,000","$160","$12,160"],ans:3},
  {q:"How is Stock dividend different from cash dividend?",opts:["Stock dividend increases cash account balance of the corporation","Stock dividend reduces equity","Stock dividend reduces assets","Stock dividend does not reduce assets and equity"],ans:3},
  {q:"Shareholder's equity does not include:",opts:["Reserves","Retained earnings","Share capital","Contingent assets"],ans:3},
  {q:"The Company obtained a machine for $10,000 on January 1, 2019. It estimates the salvage value of $2,000 and useful life of 8 years. What is the accumulated depreciation as at 31 December 2020 using double declining balance method?",opts:["$1,000","$2,343.75","$2,500","$4,375"],ans:3},
  {q:"A business completed these transactions: (1) Investing $20,000 cash and a building valued at $100,000. (2) Purchased $10,000 of a truck on credit. (3) Paid $20,000 cash for raw material. (4) Sold products and collected $40,000 cash. What was the balance of the cash account after these transactions were posted?",opts:["$130,000","$30,000","$40,000","$140,000"],ans:2},
  {q:"On January 1, a company issues bonds with a par value of $300,000. The bonds mature in 5 years. The contract rate is 9%, interest paid semiannually. The market rate is 8% and bonds are sold for $312,177. The journal entry to record the issuance is:",opts:["Debit Cash $312,177; Credit Discount on Bonds Payable $12,177; Credit Bonds Payable $300,000","Debit Cash $300,000; Debit Premium on Bonds Payable $12,177; Credit Bonds Payable $312,177","Debit Bonds Payable $300,000; Debit Bond Interest Expense $12,177; Credit Cash $312,177","Debit Cash $312,177; Credit Premium on Bonds Payable $12,177; Credit Bonds Payable $300,000"],ans:3},
  {q:"A company purchased merchandise on account for $12,000 with terms 1/10, n/30. They paid the amount due after the discount period. What is the amount paid for the merchandise?",opts:["$11,880","$11,760","$12,120","$12,000"],ans:3},
  {q:"A company purchased merchandise for $8,000 with terms 3/15, n/45. They returned $1,000 of the merchandise before making the payment within the discount period. What is the amount paid for the merchandise?",opts:["$6,790","$6,930","$6,900","$7,770"],ans:0},
  {q:"A company using the perpetual inventory system sold merchandise for $12,000 with terms 2/10, n/30. The cost of the merchandise sold was $8,000. The customer returned $2,000 of the merchandise before paying within the discount period. What is the amount paid by the customer?",opts:["$9,400","$9,600","$9,800","$9,000"],ans:2},
  {q:"At the beginning of January, a Law company has a normal balance of $50,000 for accounts receivable. During January, the company collected $14,000 from customers and provided additional services to customers on account totaling $12,000. Additionally, company used service of $1,000 on credit. At the end of January, the balance in the accounts receivable account should be:",opts:["$49,000","$48,000","$36,000","$26,000"],ans:1},
  {q:"A company's Office Supplies account shows a beginning balance of $600 and an ending balance of $400. If office supplies expense for the year is $3,100, what amount of office supplies was purchased during the period?",opts:["$2,700","$2,900","$3,300","$3,500"],ans:1},
  {q:"John set up a new business: (1) Open new restaurant investing $30,000 cash and $10,000 equipment. (2) Purchased $1,000 of kitchen utility on credit. (3) Paid $1,500 cash for staff salary. (4) Service meals and collected $4,000 cash. What was the balance of the cash account after these transactions?",opts:["$46,500","$42,500","$45,500","$32,500"],ans:3},
  {q:"On December 1, A-Corp Company signed a 90-day, 4% note payable with a face value of $45,000. What amount of interest expense is accrued at December 31 on the note?",opts:["$0","$150","$300","$450"],ans:1},

  {q:"Which statement is true about book value?",opts:["Total asset cost plus accumulated depreciation equals book value","Total asset cost minus accumulated depreciation equals book value","Total asset plus depreciation expense equals book value","Total asset minus depreciation expense equals book value"],ans:1},
  {q:"Book value is equal to: (Choose the CORRECT statement)",opts:["Total asset cost minus depreciation expense","Total asset cost plus depreciation expense","Total asset plus depreciation expense","None of these (correct: Total asset cost minus accumulated depreciation expenses)"],ans:3},
  {q:"Realistic Company purchased a new truck on January 1, 20X1. The truck cost $20,000, has a four-year life, and a $4,000 residual value. Using the straight-line method, what should Realistic report as the book value of the truck at the end of 20X3?",opts:["$1,600","$4,000","$8,000","$16,000"],ans:2},
  {q:"A company has a $100,000; 9%; 120 day note payable issued on 6 December. How much of interest payable will be reported in the balance sheet as at 31 December?",opts:["$0 because interest is not yet paid","$625","$360","$450"],ans:1},
  {q:"Which statement is true about current liabilities?",opts:["Current liabilities include accounts receivable, unearned revenues, and salaries payable","Current liabilities include prepayment, unearned revenues, and salaries payable","Current liabilities include revenue, unearned revenues, and salaries payable","Current liabilities include accounts payable, unearned revenues, and salaries payable"],ans:3},
  {q:"On 11 December, the company provided service and received $4,400. The service is subject to VAT of 10%. What is the journal entry to record this?",opts:["Dr Cash 4,400; Cr Service revenue 4,400","Dr Cash 4,000; Cr Service revenue 4,000","Dr Cash 4,400; Cr Service revenue 4,000; Cr VAT payable 400","Dr Revenue 4,000; Dr VAT receivable 400; Cr Cash 4,400"],ans:2},
  {q:"Orange Company purchased equipment on July 1 for $28,500. Estimated useful life of five years and salvage value of $4,500. The amount of monthly depreciation expense is:",opts:["$2,400","$200","$4,800","$400"],ans:3},
  {q:"A company used straight-line depreciation for equipment that cost $12,000, had a salvage value of $2,000, and a five-year useful life. What is the depreciation expense for one year?",opts:["$1,000","$1,800","$2,400","$2,000"],ans:3},
  {q:"An employee receives an hourly rate of $25, with time and a half for all hours worked over 40. Hours worked: 46; federal income tax withheld: $350; cumulative earnings prior to current week: $99,700; social security rate: 6.0% on max $100,000; Medicare rate: 1.5%. What is the gross pay?",opts:["$1,225.00","$838.62","$1,075.00","$975.00"],ans:0},
  {q:"An employee receives hourly rate of $25, time and a half over 40 hours. Hours worked: 46; federal income tax: $350; cumulative prior earnings: $99,700; social security: 6.0% on max $100,000; Medicare: 1.5%. What is the net amount to be paid?",opts:["$838.62","$1,225.00","$875.00","$950.00"],ans:0},
  {q:"A company has inventory of 20 units at $12 each on August 1. On August 5, purchased 10 units at $13. On August 12, purchased 15 units at $14. On August 15, sold 30 units. Using FIFO periodic inventory method, what is the value of Cost of goods sold on August 15?",opts:["$140","$160","$370","$210"],ans:2},
  {q:"A company had inventory of 15 units at $20 each on November 1. On November 2, purchased 10 units at $22 each. On November 6, purchased 12 units at $25 each. On November 8, sold 22 units. Using FIFO perpetual inventory method, what was the cost of the 22 units sold?",opts:["$454","$366","$450","$570"],ans:0},
  {q:"A company has inventory of 15 units at $2 each on August 1. On August 5, purchased 10 units at $3. On August 12, purchased 20 units at $4. On August 15, sold 30 units. Using FIFO perpetual inventory method, what is the value of the inventory at August 15 after the sale?",opts:["$140","$80","$60","$30"],ans:2},
  {q:"A company had the following purchases: Jan 10 units at $120; Feb 20 units at $130; May 15 units at $140; Sep 12 units at $150; Nov 10 units at $160. On December 31, there were 26 units remaining (2 from Jan, 4 from Feb, 6 from May, 4 from Sep, 10 from Nov). Using the specific identification method, what is the cost of the ending inventory?",opts:["$3,500","$3,800","$3,960","$3,280"],ans:1},
  {q:"Which of the following inventory costing methods will always result in the same values for ending inventory and COGS regardless of whether a perpetual or periodic inventory system is used?",opts:["FIFO and LIFO","LIFO and weighted-average cost","Specific identification and FIFO","FIFO and weighted-average cost"],ans:2},
  {q:"If the liabilities of a business increased $75,000 during a period and the owner's equity in the business decreased $30,000 during the same period, the assets of the business must have:",opts:["Decreased $105,000","Decreased $45,000","Increased $30,000","Increased $45,000"],ans:3},
  {q:"Which of the following is NOT correct regarding the manufacturing overhead budget?",opts:["Total budgeted cash disbursements for manufacturing overhead is equal to the total of budgeted variable and fixed manufacturing overhead","Manufacturing overhead costs should be broken down by cost behavior","The manufacturing overhead budget should provide a schedule of all costs of production other than direct materials and direct labor","A schedule showing budgeted cash disbursements for manufacturing overhead should be prepared for use in developing the cash budget"],ans:0}
];

let questions = [...ALL_QUESTIONS];
let currentIdx = 0;
let answered = 0;
let correctCount = 0;
let wrongCount = 0;
let shuffled = false;
let wrongOnlyMode = false;
let wrongIndices = [];

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function shuffleQuestions() {
  shuffled = !shuffled;
  const btn = document.getElementById('shuffleBtn');
  if (shuffled) {
    questions = shuffle([...ALL_QUESTIONS]);
    btn.classList.add('active');
    btn.textContent = '🔀 Đã xáo trộn';
  } else {
    questions = [...ALL_QUESTIONS];
    btn.classList.remove('active');
    btn.textContent = '🔀 Xáo trộn';
  }
  resetStats();
  renderQuestion();
}

function toggleMode() {
  wrongOnlyMode = !wrongOnlyMode;
  const btn = document.getElementById('modeBtn');
  if (wrongOnlyMode && wrongIndices.length > 0) {
    questions = wrongIndices.map(i => ALL_QUESTIONS[i]);
    btn.classList.add('active');
    btn.textContent = '📖 Tất cả câu';
    document.getElementById('totalStat').textContent = questions.length;
  } else {
    wrongOnlyMode = false;
    questions = shuffled ? shuffle([...ALL_QUESTIONS]) : [...ALL_QUESTIONS];
    btn.classList.remove('active');
    btn.textContent = '📖 Chỉ câu sai';
    document.getElementById('totalStat').textContent = ALL_QUESTIONS.length;
  }
  resetStats();
  renderQuestion();
}

function resetStats() {
  currentIdx = 0;
  answered = 0;
  correctCount = 0;
  wrongCount = 0;
  updateStats();
  document.getElementById('completionScreen').classList.remove('visible');
  document.getElementById('quizArea').style.display = '';
}

function resetQuiz() {
  wrongOnlyMode = false;
  shuffled = false;
  questions = [...ALL_QUESTIONS];
  wrongIndices = [];
  document.getElementById('shuffleBtn').classList.remove('active');
  document.getElementById('shuffleBtn').textContent = '🔀 Xáo trộn';
  document.getElementById('modeBtn').classList.remove('active');
  document.getElementById('modeBtn').textContent = '📖 Chỉ câu sai';
  document.getElementById('totalStat').textContent = ALL_QUESTIONS.length;
  resetStats();
  renderQuestion();
}

function updateStats() {
  document.getElementById('doneStat').textContent = answered;
  document.getElementById('correctStat').textContent = correctCount;
  document.getElementById('wrongStat').textContent = wrongCount;
  const total = questions.length;
  const pct = total > 0 ? (answered / total * 100).toFixed(1) : 0;
  document.getElementById('progressText').textContent = `${answered} / ${total}`;
  document.getElementById('progressFill').style.width = pct + '%';
}

function renderQuestion() {
  if (currentIdx >= questions.length) { showCompletion(); return; }

  const q = questions[currentIdx];
  const total = questions.length;
  document.getElementById('qNumber').textContent = `CÂU ${currentIdx + 1} / ${total}`;
  document.getElementById('qText').textContent = q.q;

  const container = document.getElementById('optionsContainer');
  container.innerHTML = '';

  const labels = ['A', 'B', 'C', 'D', 'E'];
  q.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span class="option-label">${labels[i]}</span><span>${opt}</span>`;
    btn.onclick = () => checkAnswer(i, q.ans, btn, q);
    container.appendChild(btn);
  });

  document.getElementById('feedback').className = 'feedback';
  document.getElementById('feedback').style.display = 'none';
  document.getElementById('nextBtn').className = 'next-btn';

  const card = document.getElementById('questionCard');
  card.style.animation = 'none';
  void card.offsetWidth;
  card.style.animation = 'slideIn 0.4s ease';
}

function checkAnswer(selected, correct, clickedBtn, q) {
  const allBtns = document.querySelectorAll('.option-btn');
  allBtns.forEach(b => b.disabled = true);
  answered++;

  const feedbackEl = document.getElementById('feedback');
  const titleEl = document.getElementById('feedbackTitle');
  const bodyEl = document.getElementById('feedbackBody');

  if (selected === correct) {
    correctCount++;
    clickedBtn.classList.add('correct');
    feedbackEl.className = 'feedback correct-fb';
    feedbackEl.style.display = 'block';
    titleEl.className = 'feedback-title correct-title';
    titleEl.textContent = '✅ Chính xác!';
    const enc = ['Tuyệt vời! Bạn nắm vững khái niệm này rồi!','Xuất sắc! Tiếp tục phát huy nhé!','Đúng rồi! Bạn đang rất ổn đấy!','Perfect! Kiến thức kế toán vững chắc!','Bingo! Bạn hiểu đúng hoàn toàn!'];
    bodyEl.textContent = enc[Math.floor(Math.random() * enc.length)];
    spawnParticles();
  } else {
    wrongCount++;
    clickedBtn.classList.add('wrong');
    allBtns[correct].classList.add('show-correct');
    feedbackEl.className = 'feedback wrong-fb';
    feedbackEl.style.display = 'block';
    titleEl.className = 'feedback-title wrong-title';
    titleEl.textContent = '❌ Chưa đúng!';
    const labels = ['A', 'B', 'C', 'D', 'E'];
    bodyEl.innerHTML = `Đáp án đúng là <strong style="color:var(--correct)">${labels[correct]}. ${q.opts[correct]}</strong>.<br><span style="font-size:12px;color:var(--muted)">Hãy ghi nhớ khái niệm này để không mắc lại lần sau nhé!</span>`;
    const origIdx = ALL_QUESTIONS.indexOf(q);
    if (origIdx !== -1 && !wrongIndices.includes(origIdx)) wrongIndices.push(origIdx);
  }

  updateStats();
  document.getElementById('nextBtn').className = 'next-btn visible';
}

function nextQuestion() {
  currentIdx++;
  renderQuestion();
}

function showCompletion() {
  document.getElementById('quizArea').style.display = 'none';
  const screen = document.getElementById('completionScreen');
  screen.classList.add('visible');
  const total = questions.length;
  const pct = total > 0 ? Math.round(correctCount / total * 100) : 0;
  document.getElementById('finalScore').textContent = pct + '%';
  document.getElementById('finalDetail').textContent = `${correctCount} đúng / ${wrongCount} sai trong tổng số ${total} câu`;
  for (let i = 0; i < 60; i++) setTimeout(() => spawnParticles(true), i * 30);
}

function spawnParticles(big = false) {
  const colors = ['#7c5cfc','#fc5c7d','#22c55e','#f4c430','#38bdf8'];
  const count = big ? 3 : 1;
  for (let i = 0; i < count; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + 'vw';
    p.style.top = '-20px';
    p.style.background = colors[Math.floor(Math.random() * colors.length)];
    p.style.animationDuration = (1.5 + Math.random() * 2) + 's';
    p.style.width = (6 + Math.random() * 8) + 'px';
    p.style.height = (6 + Math.random() * 8) + 'px';
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 4000);
  }
}

renderQuestion();
</script>
